name: Build Now in Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Extract app.zip
        run: |
          unzip -q app.zip -d app
          unzip -q build-logic.zip -d build-logic
          unzip -q core.zip -d core
          unzip -q feature.zip -d feature

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NowInAndroid-App
          path: app/build/outputs/apk/debug/*.apk
