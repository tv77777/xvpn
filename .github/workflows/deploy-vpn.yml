const USER_UUID = 'b8314d9a-3d7f-4e6c-8a5b-2f1c9e7d4a3b';
const PROXY_PATH = '/vpn';

async function handleRequest(request) {
    const url = new URL(request.url);
    if (url.pathname === PROXY_PATH) {
        const upgrade = request.headers.get('Upgrade');
        if (!upgrade || upgrade !== 'websocket') return new Response('WebSocket required', { status: 400 });
        const webSocketPair = new WebSocketPair();
        const [client, server] = Object.values(webSocketPair);
        server.accept();
        server.addEventListener('message', async (event) => {
            try {
                const data = JSON.parse(event.data);
                const response = await fetch(data.url || 'https://www.google.com', {
                    method: data.method || 'GET',
                    headers: data.headers || {},
                    body: data.body ? Uint8Array.from(atob(data.body), c => c.charCodeAt(0)) : null
                });
                const body = await response.arrayBuffer();
                server.send(JSON.stringify({
                    status: response.status,
                    headers: Object.fromEntries(response.headers),
                    body: btoa(String.fromCharCode(...new Uint8Array(body)))
                }));
            } catch (error) {
                server.send(JSON.stringify({ error: error.message }));
            }
        });
        return new Response(null, { status: 101, webSocket: client, headers: { 'Upgrade': 'websocket', 'Connection': 'Upgrade' } });
    }
    const host = url.hostname;
    const vlessLink = `vless://${USER_UUID}@${host}:443?path=${PROXY_PATH}&security=tls&encryption=none&host=${host}&type=ws#خادمي`;
    return new Response(`<h1>🚀 VPN Worker</h1><p>انسخ هذا الرابط في v2rayNG:</p><code>${vlessLink}</code>`, { headers: { 'Content-Type': 'text/html' } });
}
export default { fetch: handleRequest };
